[pytest]
# Pytest configuration for Multi-Agent Assistant API

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v                          # Verbose output
    --tb=short                  # Shorter traceback format
    --strict-markers           # Strict marker enforcement
    --disable-warnings         # Disable warnings
    -p no:warnings             # Disable warnings plugin
    --color=yes                # Colored output
    --maxfail=1                # Stop after first failure (remove for full suite)

# Test paths
testpaths = .

# Markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for system components
    slow: Tests that take longer to run
    asyncio: Asynchronous tests

# Asyncio configuration
asyncio_mode = auto

# Coverage options (if using pytest-cov)
# Uncomment to enable coverage reporting
# addopts = --cov=. --cov-report=html --cov-report=term

# Logging
log_cli = false
log_cli_level = INFO
